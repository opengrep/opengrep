rules:
  - id: eqeq-five
    pattern: $X == 5
    message: "useless comparison to 5"
    languages: [python]
    severity: ERROR
    metadata:
    fix: $X == 2
  - id: eqeq-four
    pattern: $X == 4
    message: "useless comparison to 4"
    languages: [python]
    severity: ERROR
    metadata:
        sca-kind: reachable
    fix: $X == 2
  - id: eqeq-three
    pattern: $X == 3
    message: "useless comparison to 3"
    languages: [python]
    severity: ERROR
    metadata:
        product: secrets
    fix: $X == 2
  - id: eqeq-two
    pattern: $X == 2
    message: "useless comparison to 2"
    languages: [python]
    severity: ERROR
    metadata:
        interfile: true
    fix: $X == 5
  - id: taint-cross-fn
    mode: taint
    languages: [python]
    severity: ERROR
    message: "tainted data crosses function boundary"
    pattern-sources:
      - pattern: ls_taint_source()
    pattern-sinks:
      - pattern: ls_taint_sink(...)
