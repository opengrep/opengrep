name: build-test-core-aarch64
on:
  push:
    branches:
      - main
      - linux/**
    paths-ignore:
      - '**.md'
  pull_request:
    branches:
      - main # FIXME: Remove this.
    paths-ignore:
      - '**.md'
  workflow_call: null
  workflow_dispatch: null

jobs:

  build-core:
    strategy:
      matrix:
        ocaml_version: ["5.3.0"]
        # arch: ["aarch64"] # Later: [x86_64, aarch64]
    
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Make checkout speedy
        run: git config --global fetch.parallel 50

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # ratchet:actions/checkout@v4
        with:
          submodules: true

      - name: Configure git safedir properly
        run: git config --global --add safe.directory $(pwd)

      # gnu tar and zstd needed for cache, see:
      # https://github.com/actions/cache/issues/580
      - name: Add system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential zip bash libffi-dev \
            libpsl-dev zstd libidn2-dev \
            libunistring-dev tar

      - name: Set-up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ matrix.ocaml_version }}

      - name: Install dependencies
        run: |
          eval $(opam env)
          sudo make install-deps-UBUNTU-for-semgrep-core
          make install-deps-for-semgrep-core

      - name: Build opengrep-core
        run: |
          opam exec -- make core
  
      - name: Test opengrep-core
        run: |
          opam exec -- make core-test

      - name: Make artifact for bin/opengrep-core
        run: |
          mkdir artifacts
          cp bin/opengrep-core artifacts/
          tar czf artifacts.tgz artifacts

      - uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # ratchet:actions/upload-artifact@v4
        with:
          name: opengrep-core-aarch64 # Can use matrix.arch here when we unify the workflows.
          path: artifacts.tgz

  build-musllinux-aarch64:
    needs:
      - build-core
    container: quay.io/pypa/musllinux_1_2_aarch64
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Make checkout speedy
        run: git config --global fetch.parallel 50
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # ratchet:actions/checkout@v4
        with:
          submodules: true
      - run: |
          apk update
          apk add --no-cache zip python3 py3-pip py3-virtualenv python3-dev gcc musl-dev
      - uses: actions/download-artifact@b14cf4c92620c250e1c074ab0a5800e37df86765 # ratchet:actions/download-artifact@v4
        with:
          name: opengrep-core-aarch64
      - run: |
          tar xf artifacts.tgz
          cp artifacts/opengrep-core cli/src/semgrep/bin
          python3 -m venv venv
          . venv/bin/activate
          ./scripts/build-wheels.sh
      - uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # ratchet:actions/upload-artifact@v4
        with:
          name: musllinux-aarch64-wheel
          path: cli/dist.zip

  build-test-manylinux-aarch64:
    needs:
      - build-core
      # - build-musllinux-aarch64 # NOTE: This is not really necessary.
    uses: ./.github/workflows/build-test-manylinux.yml
    with:
      arch: aarch64
