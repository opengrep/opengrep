rules:
  - id: test-library-access-taint
    message: |
      Cross-function field-sensitive taint through C#'s IDictionary
      library-call recognisers. Dictionaries flow across function
      boundaries; field-sensitivity must survive the call.
    languages:
      - csharp
    severity: WARNING
    mode: taint
    options:
      taint_intrafile: true
    pattern-sources:
      - pattern: source()
    pattern-sinks:
      - pattern: sink($V)
