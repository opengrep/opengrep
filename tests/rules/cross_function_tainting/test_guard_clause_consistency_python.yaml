rules:
  - id: test-guard-clause-consistency
    message: An unsatisfiable guard clause drops its effect
    languages:
      - python
    severity: WARNING
    mode: taint
    options:
      taint_intrafile: true
      guarded_taint_signatures: true
    pattern-sources:
      - pattern: source(...)
    pattern-sinks:
      - pattern: sink(...)
