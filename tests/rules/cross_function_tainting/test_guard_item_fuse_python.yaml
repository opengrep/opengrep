rules:
  - id: test-guard-item-fuse
    message: Item-guard refinement must survive effect insertion
    languages:
      - python
    severity: WARNING
    mode: taint
    options:
      taint_intrafile: true
      guarded_taint_signatures: true
    pattern-sources:
      - pattern: source(...)
    pattern-sinks:
      - pattern: sink(...)
