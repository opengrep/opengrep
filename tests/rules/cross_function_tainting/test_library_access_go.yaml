rules:
  - id: test-library-access-taint
    message: |
      Cross-function field-sensitive taint through Go's map library
      idioms. Maps flow across function boundaries; field-sensitivity
      must survive the call.
    languages:
      - go
    severity: WARNING
    mode: taint
    options:
      taint_intrafile: true
    pattern-sources:
      - pattern: source()
    pattern-sinks:
      - pattern: sink($V)
