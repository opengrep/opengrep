rules:
  - id: taint-func-param
    message: Tainted parameter reaches sink
    languages: [javascript]
    severity: ERROR
    mode: taint
    pattern-sources:
      - patterns:
          - pattern-inside: |
              function $X(..., $RES, ...) {...}
          - focus-metavariable: $RES
    pattern-sinks:
      - pattern: sink(...)
