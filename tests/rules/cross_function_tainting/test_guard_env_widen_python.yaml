rules:
  - id: test-guard-env-widen
    message: Fixpoint stability must see guard widening
    languages:
      - python
    severity: WARNING
    mode: taint
    options:
      taint_intrafile: true
      guarded_taint_signatures: true
    pattern-sources:
      - pattern: source(...)
    pattern-sinks:
      - pattern: sink(...)
