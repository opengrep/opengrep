rules:
  - id: test-library-access-taint
    message: |
      Cross-function field-sensitive taint through Kotlin's
      MutableMap library-call recognisers. Maps flow across function
      boundaries; field-sensitivity must survive the call, and the
      [getOrElse] trailing lambda's body is followed by the
      intrafile analyser.
    languages:
      - kotlin
    severity: WARNING
    mode: taint
    options:
      taint_intrafile: true
    pattern-sources:
      - pattern: source()
    pattern-sinks:
      - pattern: sink($V)
