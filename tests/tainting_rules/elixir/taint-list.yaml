rules:  
- id: list_taint_rule
  languages: [elixir]
  message: "tainted data reached sink"
  severity: ERROR
  mode: taint
  pattern-sources:
    - patterns:
      - pattern-either:
          - pattern-inside: |
              def $_(..., $X, ...) do
              ...
              end
      - focus-metavariable: $X
  pattern-sinks:
    - pattern: |
        sink(...)
