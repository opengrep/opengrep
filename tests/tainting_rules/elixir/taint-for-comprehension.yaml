rules:
- id: for_comp_taint
  languages: [elixir]
  message: "tainted data reached sink via for comprehension"
  severity: ERROR
  mode: taint
  pattern-sources:
    - patterns:
      - pattern-either:
          - pattern-inside: |
              def $_(..., $X, ...) do
              ...
              end
      - focus-metavariable: $X
  pattern-sinks:
    - pattern: |
        sink(...)
